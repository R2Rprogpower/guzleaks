name: CI (Docker identical)

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Speeds up image build (optional but helps a lot)
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build + start stack
        run: |
          docker buildx create --use
          make ci-up

      - name: Install deps + migrate
        run: make ci-setup

      - name: Run checks (same as local)
        run: make ci-check

      - name: Tear down
        if: always()
        run: make ci-down

  deploy:
    needs: docker-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DEPLOY_SETUP_DIR: ${{ vars.DEPLOY_SETUP_DIR || secrets.DEPLOY_SETUP_DIR }}
      DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || secrets.DEPLOY_ENV_FILE }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN || secrets.APP_DOMAIN }}
      PGADMIN_DOMAIN: ${{ vars.PGADMIN_DOMAIN || secrets.PGADMIN_DOMAIN }}
      ACME_EMAIL: ${{ vars.ACME_EMAIL || secrets.ACME_EMAIL }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      BRANCH: ${{ github.ref_name }}

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_SETUP_DIR,DEPLOY_ENV_FILE,APP_DOMAIN,PGADMIN_DOMAIN,ACME_EMAIL,REPO_URL,BRANCH
          script: |
            set -e

            sanitize_value() {
              printf '%s' "$1" | tr -d '\r\n'
            }

            DEPLOY_SETUP_DIR="$(sanitize_value "${DEPLOY_SETUP_DIR:-}")"
            DEPLOY_ENV_FILE="$(sanitize_value "${DEPLOY_ENV_FILE:-}")"
            APP_DOMAIN="$(sanitize_value "${APP_DOMAIN:-}")"
            PGADMIN_DOMAIN="$(sanitize_value "${PGADMIN_DOMAIN:-}")"
            ACME_EMAIL="$(sanitize_value "${ACME_EMAIL:-}")"
            REPO_URL="$(sanitize_value "${REPO_URL:-}")"
            BRANCH="$(sanitize_value "${BRANCH:-main}")"

            : "${DEPLOY_SETUP_DIR:?Missing DEPLOY_SETUP_DIR (set as variable or secret)}"
            : "${DEPLOY_ENV_FILE:?Missing DEPLOY_ENV_FILE (set as variable or secret)}"
            : "${APP_DOMAIN:?Missing APP_DOMAIN (set as variable or secret)}"
            : "${PGADMIN_DOMAIN:?Missing PGADMIN_DOMAIN (set as variable or secret)}"
            : "${ACME_EMAIL:?Missing ACME_EMAIL (set as variable or secret)}"
            : "${REPO_URL:?REPO_URL could not be resolved}"

            DEPLOY_BASE_DIR="$(dirname "$DEPLOY_SETUP_DIR")"

            cd "$DEPLOY_SETUP_DIR"
            git pull origin main
            DEPLOY_BASE_DIR="$DEPLOY_BASE_DIR" \
            DOMAIN="$APP_DOMAIN" \
            PGADMIN_DOMAIN="$PGADMIN_DOMAIN" \
            ACME_EMAIL="$ACME_EMAIL" \
            bash scripts/deploy.sh \
              --repo "$REPO_URL" \
              --branch "$BRANCH" \
              --env "$DEPLOY_ENV_FILE"

      - name: Notify deploy success
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set; skipping success notification."
            exit 0
          fi
          payload=$(printf '{"text":"✅ Deploy succeeded for %s @ %s"}' "$GITHUB_REPOSITORY" "$GITHUB_SHA")
          curl -sS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Notify deploy failure
        if: failure()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set; skipping failure notification."
            exit 0
          fi
          payload=$(printf '{"text":"❌ Deploy failed for %s @ %s. Check GitHub Actions logs."}' "$GITHUB_REPOSITORY" "$GITHUB_SHA")
          curl -sS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"